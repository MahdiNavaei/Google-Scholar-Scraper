name: Build Windows Artifacts

on:
  workflow_dispatch:
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      VERSION: "2.0.1"
      APP_DIR: Google-Scholar-Scraper-v2.0.1
      PORTABLE_NAME: Google-Scholar-Scraper-v2.0.1-Portable-Windows-x64.zip
      INSTALLER_NAME: Google-Scholar-Scraper-v2.0.1-Setup-Windows-x64.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install runtime and build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints/release-2.0.1.txt . pyinstaller

      - name: Compile source and tests
        run: python -m compileall prog.py src tests scripts/collect_third_party_licenses.py

      - name: Run deterministic tests
        run: python -m unittest discover -s tests

      - name: Remove generated build outputs
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          foreach ($path in @("build", "dist")) {
            if (Test-Path -LiteralPath $path) {
              Remove-Item -LiteralPath $path -Recurse -Force
            }
          }

      - name: Build PyInstaller onedir application
        run: python -m PyInstaller packaging\pyinstaller\GoogleScholarScraper.spec --noconfirm --clean

      - name: Copy distribution notices
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $appDir = "dist\$env:APP_DIR"
          $internalDir = Join-Path $appDir "_internal"
          if (Test-Path -LiteralPath $internalDir) {
            foreach ($pattern in @("h2-*.dist-info", "hpack-*.dist-info", "hyperframe-*.dist-info")) {
              Get-ChildItem -LiteralPath $internalDir -Directory -Filter $pattern -ErrorAction SilentlyContinue |
                Remove-Item -Recurse -Force
            }
          }
          foreach ($name in @("LICENSE", "NOTICE", "COMMERCIAL_LICENSE.md", "THIRD_PARTY_NOTICES.txt")) {
            $source = Join-Path (Resolve-Path ".") $name
            $target = Join-Path $appDir $name
            if (-not (Test-Path -LiteralPath $source)) {
              throw "Required distribution notice is missing from source: $source"
            }
            Copy-Item -LiteralPath $source -Destination $target -Force
          }

      - name: Collect exact third-party licenses
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $appDir = "dist\$env:APP_DIR"
          python scripts\collect_third_party_licenses.py `
            --constraints constraints\release-2.0.1.txt `
            --app-dir $appDir `
            --output-dir "$appDir\third_party_licenses"
          if ($LASTEXITCODE -ne 0) {
            throw "Third-party license collection failed with exit code $LASTEXITCODE."
          }

      - name: Verify packaged executable and distribution compliance
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $appDir = "dist\$env:APP_DIR"
          $exe = "$appDir\GoogleScholarScraper.exe"
          if (-not (Test-Path -LiteralPath $exe)) {
            throw "Expected packaged executable missing: $exe"
          }

          foreach ($name in @("LICENSE", "NOTICE", "COMMERCIAL_LICENSE.md", "THIRD_PARTY_NOTICES.txt")) {
            $path = Join-Path $appDir $name
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Required distribution notice missing: $path"
            }
            $duplicate = Join-Path "$appDir\_internal" $name
            if (Test-Path -LiteralPath $duplicate) {
              throw "Distribution notice must not be duplicated inside _internal: $duplicate"
            }
          }

          $licenseRoot = Join-Path $appDir "third_party_licenses"
          $requiredEntries = @(
            "MANIFEST.txt",
            "beautifulsoup4",
            "soupsieve",
            "openpyxl",
            "et-xmlfile",
            "requests",
            "urllib3",
            "charset-normalizer",
            "idna",
            "certifi",
            "typing-extensions",
            "pyinstaller",
            "pyinstaller-hooks-contrib",
            "python",
            "tcl-tk"
          )
          foreach ($entry in $requiredEntries) {
            $path = Join-Path $licenseRoot $entry
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Required third-party license bundle entry missing: $path"
            }
          }

          $legalFiles = Get-ChildItem -LiteralPath $licenseRoot -File -Recurse |
            Where-Object { $_.Name -ne "MANIFEST.txt" }
          if (-not $legalFiles) {
            throw "Third-party license bundle contains no legal files."
          }

          $unexpected = Get-ChildItem -LiteralPath "$appDir\_internal" -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -like "h2-*.dist-info" -or $_.Name -like "hpack-*.dist-info" -or $_.Name -like "hyperframe-*.dist-info" }
          if ($unexpected) {
            throw "Unexpected optional HTTP/2 metadata found: $($unexpected.Name -join ', ')"
          }

      - name: Build Portable ZIP
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path dist\release -Force | Out-Null
          Compress-Archive -Path "dist\$env:APP_DIR" -DestinationPath "dist\release\$env:PORTABLE_NAME" -Force
          $zip = Get-Item -LiteralPath "dist\release\$env:PORTABLE_NAME"
          if ($zip.Length -le 0) {
            throw "Portable ZIP is empty."
          }

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install innosetup --no-progress -y
          $candidates = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          )
          $iscc = $candidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (-not $iscc) {
            $command = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($command) {
              $iscc = $command.Source
            }
          }
          if (-not $iscc) {
            throw "Inno Setup compiler was not found."
          }
          & $iscc /?
          "ISCC=$iscc" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build Windows Installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & "$env:ISCC" installer\GoogleScholarScraper.iss
          $installer = "dist\installer\$env:INSTALLER_NAME"
          if (-not (Test-Path -LiteralPath $installer)) {
            throw "Expected installer missing: $installer"
          }
          if ((Get-Item -LiteralPath $installer).Length -le 0) {
            throw "Installer is empty."
          }

      - name: Packaged export smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $smokeDir = Join-Path (Resolve-Path "dist") "smoke"
          Remove-Item -LiteralPath $smokeDir -Recurse -Force -ErrorAction SilentlyContinue
          $exe = "dist\$env:APP_DIR\GoogleScholarScraper.exe"
          $process = Start-Process -FilePath $exe -ArgumentList @("--packaging-smoke", $smokeDir) -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Packaged smoke exited with $($process.ExitCode)."
          }
          foreach ($name in @("packaging-smoke.xlsx", "packaging-smoke.csv")) {
            $path = Join-Path $smokeDir $name
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Missing smoke export: $path"
            }
            if ((Get-Item -LiteralPath $path).Length -le 0) {
              throw "Smoke export is empty: $path"
            }
          }

      - name: Installer install-launch-export-uninstall smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installer = "dist\installer\$env:INSTALLER_NAME"
          $installRoot = Join-Path $env:RUNNER_TEMP "google-scholar-scraper-install"
          $smokeDir = Join-Path $env:RUNNER_TEMP "google-scholar-scraper-installed-smoke"
          Remove-Item -LiteralPath $installRoot -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $smokeDir -Recurse -Force -ErrorAction SilentlyContinue

          $install = Start-Process -FilePath $installer -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/NOICONS", "/DIR=$installRoot") -Wait -PassThru
          if ($install.ExitCode -ne 0) {
            throw "Installer exited with $($install.ExitCode)."
          }

          $exe = Join-Path $installRoot "GoogleScholarScraper.exe"
          if (-not (Test-Path -LiteralPath $exe)) {
            throw "Installed executable missing: $exe"
          }
          foreach ($name in @("LICENSE", "NOTICE", "COMMERCIAL_LICENSE.md", "THIRD_PARTY_NOTICES.txt")) {
            $path = Join-Path $installRoot $name
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Installed distribution notice missing: $path"
            }
          }
          foreach ($entry in @("MANIFEST.txt", "requests", "urllib3", "idna", "python", "tcl-tk")) {
            $path = Join-Path (Join-Path $installRoot "third_party_licenses") $entry
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Installed third-party license bundle entry missing: $path"
            }
          }

          $process = Start-Process -FilePath $exe -ArgumentList @("--packaging-smoke", $smokeDir) -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Installed smoke exited with $($process.ExitCode)."
          }
          foreach ($name in @("packaging-smoke.xlsx", "packaging-smoke.csv")) {
            $path = Join-Path $smokeDir $name
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Missing installed smoke export: $path"
            }
            if ((Get-Item -LiteralPath $path).Length -le 0) {
              throw "Installed smoke export is empty: $path"
            }
          }

          $uninstaller = Join-Path $installRoot "unins000.exe"
          if (-not (Test-Path -LiteralPath $uninstaller)) {
            throw "Uninstaller missing: $uninstaller"
          }
          $uninstall = Start-Process -FilePath $uninstaller -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART") -Wait -PassThru
          if ($uninstall.ExitCode -ne 0) {
            throw "Uninstaller exited with $($uninstall.ExitCode)."
          }

      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $files = @(
            "dist\release\$env:PORTABLE_NAME",
            "dist\installer\$env:INSTALLER_NAME"
          )
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -LiteralPath $file -Algorithm SHA256).Hash.ToLowerInvariant()
            $name = Split-Path -Leaf $file
            "$hash  $name"
          }
          $lines | Set-Content -LiteralPath dist\release\SHA256SUMS.txt -Encoding ASCII

      - name: Verify final artifact names
        shell: pwsh
        run: |
          $expected = @(
            "dist\release\$env:PORTABLE_NAME",
            "dist\installer\$env:INSTALLER_NAME",
            "dist\release\SHA256SUMS.txt"
          )
          foreach ($path in $expected) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Missing expected artifact: $path"
            }
            if ((Get-Item -LiteralPath $path).Length -le 0) {
              throw "Expected artifact is empty: $path"
            }
          }

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: google-scholar-scraper-v2.0.1-windows-artifacts
          path: |
            dist/release/Google-Scholar-Scraper-v2.0.1-Portable-Windows-x64.zip
            dist/installer/Google-Scholar-Scraper-v2.0.1-Setup-Windows-x64.exe
            dist/release/SHA256SUMS.txt
          if-no-files-found: error
